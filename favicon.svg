<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">

  <!-- Fork (left) -->
  <g stroke="#ff0157" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Tines -->
    <line x1="5"   y1="3" x2="5"   y2="10"/>
    <line x1="7.5" y1="3" x2="7.5" y2="10"/>
    <line x1="10"  y1="3" x2="10"  y2="10"/>
    <!-- Tine base arc -->
    <path d="M5,10 Q5,13 7.5,14 Q10,13 10,10"/>
    <!-- Handle -->
    <line x1="7.5" y1="14" x2="7.5" y2="29"/>
  </g>

  <!-- Plate circle -->
  <circle cx="16" cy="16" r="8.5" fill="#ff0157" opacity="0.15"/>
  <circle cx="16" cy="16" r="8.5" fill="none" stroke="#ff0157" stroke-width="1.8"/>
  <!-- Inner ring -->
  <circle cx="16" cy="16" r="5.5" fill="none" stroke="#ff0157" stroke-width="0.8" opacity="0.5"/>

  <!-- Knife (right) -->
  <g stroke="#ff0157" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Blade -->
    <line x1="24.5" y1="3"  x2="24.5" y2="29"/>
    <!-- Blade top curved edge -->
    <path d="M24.5,3 C24.5,3 27,6 27,11 L24.5,12"/>
  </g>

</svg>
