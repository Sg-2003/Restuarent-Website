<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark rounded square background -->
  <rect width="32" height="32" rx="8" ry="8" fill="#111111"/>

  <!-- Red accent circle (plate) -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="#ff0157" stroke-width="1.5"/>

  <!-- Fork (left) -->
  <g stroke="#ffffff" stroke-width="1.4" stroke-linecap="round" fill="none">
    <!-- Fork tines -->
    <line x1="12.5" y1="7"  x2="12.5" y2="12"/>
    <line x1="14"   y1="7"  x2="14"   y2="12"/>
    <line x1="15.5" y1="7"  x2="15.5" y2="12"/>
    <!-- Fork neck -->
    <path d="M12.5,12 Q12.5,14.5 14,15.5 Q15.5,14.5 15.5,12"/>
    <!-- Fork handle -->
    <line x1="14" y1="15.5" x2="14" y2="25"/>
  </g>

  <!-- Knife (right) -->
  <g stroke="#ff0157" stroke-width="1.4" stroke-linecap="round" fill="none">
    <!-- Knife blade -->
    <path d="M18.5,7 C18.5,7 20.5,9 20.5,13 L20.5,25"/>
    <!-- Knife bolster -->
    <line x1="18" y1="13" x2="21" y2="13"/>
  </g>
</svg>
