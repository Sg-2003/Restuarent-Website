<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" width="220" height="60">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700&amp;display=swap');
    </style>
  </defs>

  <!-- Fork icon on the left -->
  <g transform="translate(8, 10)" fill="none" stroke="#ff0157" stroke-width="2" stroke-linecap="round">
    <!-- Fork tines -->
    <line x1="6"  y1="2"  x2="6"  y2="14"/>
    <line x1="10" y1="2"  x2="10" y2="14"/>
    <line x1="14" y1="2"  x2="14" y2="14"/>
    <!-- Fork neck arc -->
    <path d="M6,14 Q6,18 10,20 Q14,18 14,14"/>
    <!-- Fork handle -->
    <line x1="10" y1="20" x2="10" y2="38"/>

    <!-- Knife -->
    <path d="M22,2 C22,2 26,8 26,16 L26,38" stroke="#ffffff" stroke-width="1.8"/>
    <path d="M22,2 C22,2 26,2 26,10" fill="#ffffff" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- Divider line -->
  <line x1="48" y1="10" x2="48" y2="50" stroke="#ff0157" stroke-width="1.5" opacity="0.4"/>

  <!-- "Food" text -->
  <text
    x="58"
    y="42"
    font-family="'Poppins', 'Segoe UI', Arial, sans-serif"
    font-weight="700"
    font-size="32"
    fill="#ffffff"
    letter-spacing="1"
  >Food</text>

  <!-- Red dot accent -->
  <circle cx="200" cy="38" r="5" fill="#ff0157"/>
</svg>
